<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Notice</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fafafa;
    overflow: hidden;
}

/* POPUP BESAR (HP FRIENDLY) */
.container {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: white;
    padding: 30px 20px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
    z-index: 10;
}

/* LOGO */
.logo {
    font-size: 34px;
    font-weight: bold;
    background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af, #515bd4);
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 20px;
}

/* TITLE */
.warning {
    font-size: 22px;
    color: red;
    font-weight: bold;
    margin-bottom: 15px;
}

/* DESC */
.desc {
    font-size: 16px;
    line-height: 1.6;
    color: #333;
    margin-bottom: 25px;
}

/* BUTTON */
.btn {
    padding: 14px 25px;
    font-size: 16px;
    border: none;
    background: #e53935;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.btn:active {
    background: #b71c1c;
}

/* SCARY SCREEN */
.scary {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: url('scary.jpg') center/cover no-repeat;
    display: none;
    z-index: 999;
}

/* GLITCH TEXT */
.glitch-container {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
}

.glitch {
    color: red;
    font-size: 22px;
    font-weight: bold;
    margin: 4px;
    animation: glitch 0.25s infinite;
}

@keyframes glitch {
    0% { transform: translate(0); }
    25% { transform: translate(-2px, 2px); }
    50% { transform: translate(2px, -2px); }
    75% { transform: translate(-1px, 1px); }
    100% { transform: translate(0); }
}
</style>
</head>

<body>

<div class="container" id="warningBox">
    <div class="logo">Instagram</div>

    <div class="warning">Security Notice</div>

    <div class="desc">
        We detected activity that may not follow our guidelines.<br><br>
        Your account will be reviewed within 3 days.<br>
        Please review your activity to avoid restrictions.
    </div>

    <button class="btn" onclick="triggerScary()">Continue</button>
</div>

<div class="scary" id="scaryScreen">
    <div class="glitch-container" id="glitchContainer"></div>
</div>

<audio id="scarySound">
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
window.onload = function() {
    setTimeout(() => {
        alert("Your account will be reviewed within 3 days.");
        document.getElementById("warningBox").style.display = "flex";
    }, 800);
};

function triggerScary() {
    document.getElementById("scaryScreen").style.display = "block";

    let sound = document.getElementById("scarySound");
    sound.play().catch(() => {});

    let container = document.getElementById("glitchContainer");

    for (let i = 0; i < 120; i++) {
        let span = document.createElement("span");
        span.className = "glitch";
        span.innerText = "STUPID";
        container.appendChild(span);
    }

    // getar HP (kalau support)
    if (navigator.vibrate) {
        navigator.vibrate([200,100,200,100,300]);
    }
}
</script>

</body>
</html>
